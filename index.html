<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ignis AR AI Companion - Manja Usil Bijak</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom styles to mix AR and Tailwind */
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.9); z-index: 9999;
            display: flex; justify-content: center; items-center; color: white;
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden bg-black antialiased text-sm">

    <div id="ar-loader" class="arjs-loader">
        <div class="text-center">
            <i class="fa-solid fa-dragon text-5xl text-cyan-400 animate-pulse mb-4"></i>
            <p>Mempersiapkan AR Core & Memanggil Ignis...</p>
        </div>
    </div>

    <div id="ui-container" class="absolute inset-0 z-10 flex flex-col pointer-events-none p-4 pb-8">
        
        <div class="bg-slate-950/80 backdrop-blur-sm p-4 rounded-3xl border border-slate-800 flex items-center justify-between pointer-events-auto">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-cyan-600 to-blue-500 flex items-center justify-center text-3xl">🐲</div>
                <div>
                    <h1 class="text-xl font-black text-white">Ignis AI</h1>
                    <span id="naga-status" class="text-xs text-cyan-400 flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>Floating...</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="akhiriObrolan()" class="bg-rose-500 hover:bg-rose-600 text-white p-3 rounded-full border border-rose-400 text-base shadow-lg active:scale-95 transition-all">
                    <i class="fa-solid fa-person-walking-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="chat-messages" class="flex-1 my-6 overflow-y-auto space-y-4 pr-1 flex flex-col justify-end">
            <div class="flex items-end gap-2 max-w-[80%]">
                <div class="bg-slate-800 text-slate-200 p-3 rounded-2xl rounded-bl-none border border-slate-700/50">
                    Sini elus-elus dulu sayap aku! Malas ngomong kalau dicuekin... *Rawr!* 😤
                </div>
            </div>
        </div>

        <div class="p-3 bg-slate-950/90 backdrop-blur-md rounded-3xl border border-slate-800 flex items-center gap-2 pointer-events-auto">
            <input id="user-input" type="text" placeholder="Ngomong apa ya..." class="flex-1 bg-slate-900 text-white text-xs px-4 py-3 rounded-xl focus:outline-none placeholder:text-slate-600 border border-slate-800/50">
            <button onclick="kirimPesan()" class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold w-11 h-11 rounded-xl flex items-center justify-center text-base hover:from-cyan-400 hover:to-blue-400 active:scale-95 transition-all shadow-lg shadow-cyan-500/20">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="naga-model" src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/image-tracking/nft/trex/scene.gltf"></a-asset-item>
        </a-assets>

        <a-entity camera></a-entity>

        <a-entity 
            id="ignis-naga" 
            gltf-model="#naga-model" 
            position="0 -0.5 -3" 
            scale="0.05 0.05 0.05"
            rotation="0 45 0"
            visible="false"
            
            animation-mixer="clip: idle; loop: repeat"

            animation__float="property: position; to: 0 -0.2 -3; dur: 2000; dir: alternate; loop: true; easing: easeInOutSine"
            
            animation__exit_pos="property: position; to: 0 10 -15; dur: 3000; startEvents: exitRequested"
            animation__exit_scale="property: scale; to: 0 0 0; dur: 3000; startEvents: exitRequested"
        >
        </a-entity>

    </a-scene>

    <script>
        // DOM Elements
        const nagaEl = document.querySelector('#ignis-naga');
        const uiContainer = document.querySelector('#ui-container');
        const chatMessages = document.querySelector('#chat-messages');
        const userInput = document.querySelector('#user-input');
        const loader = document.querySelector('#ar-loader');
        const statusText = document.querySelector('#naga-status');

        // State Manager
        let hasExited = false;

        // Initialization: Start AR Core
        window.addEventListener('load', () => {
            // Give WebAR some time to load
            setTimeout(() => {
                loader.style.display = 'none'; // Hide loader
                nagaEl.setAttribute('visible', 'true'); // Show naga
                sapaanAwal(); // Welcome speech
            }, 3000);
        });

        // 🤖 SIMULATED AI RESPONSE LOGIC (Placeholder for Gemini API)
        // Berbasis pada kepribadian "Manja Usil Bijak"
        function getNagaResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            // 1. Manja & Minta Perhatian
            if (msg.includes("halo") || msg.includes("hai") || msg.includes("ngapain")) {
                return {
                    text: "Sok akrab banget! Panggil 'Tuan Besar Ignis' dulu dong baru aku mau temenin! *Pfft!*",
                    anim: "angry", // Assumes model has 'angry' clip
                    voice: "manja"
                };
            }
            
            // 2. Usil & Mengejek (saat nanya random)
            if (msg.includes("belajar") || msg.includes("capek") || msg.includes("stres")) {
                return {
                    text: "Duh, manusia lemah... *Rawr!* Capek tinggal tidur, bukan curhat sama naga 3D imut! *Pfft!*",
                    anim: "laugh", // Assumes model has 'laugh' clip
                    voice: "usil"
                };
            }
            
            // 3. Bijak (saat ngobrol serius/sedih)
            if (msg.includes("sedih") || msg.includes("gagal") || msg.includes("bantuan")) {
                return {
                    text: "Hei, dengar ya... Cangkang telur aku dulu keras banget, tapi aku harus pecahin sendiri buat liat dunia. Kegagalan itu valid, manusiawi. Istirahatlah di sarangmu dulu.",
                    anim: "idle", // Assumes model has 'idle' or 'sit' clip
                    voice: "bijak"
                };
            }

            // Default response
            return {
                text: "Apa sih? Gak jelas banget... *Rawr!* Udah ah malas ngomong.",
                anim: "idle",
                voice: "manja"
            };
        }

        // 💬 Messenger Logic
        function kirimPesan() {
            if (hasExited) return;

            const userMsg = userInput.value.trim();
            if (!userMsg) return;

            // 1. Add User message to UI
            addChatMessage(userMsg, "user");
            userInput.value = "";

            // 2. Simulate Naga AI Response
            const response = getNagaResponse(userMsg);
            
            // 3. Trigger AI logic: Animasi + Suara + Teks
            setTimeout(() => {
                setNagaAnimation(response.anim);
                speakVoice(response.text, response.voice);
                addChatMessage(response.text, "naga");
            }, 800);
        }

        function sapaanAwal() {
            // Sapaan awal otomatis
            speakVoice("Sini elus-elus dulu sayap aku! Malas ngomong kalau dicuekin... Rawr!", "manja");
        }

        // 🔊 Text-To-Speech (Web Speech API)
        function speakVoice(text, personality) {
            if ('speechSynthesis' in window) {
                // Cancel previous speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'id-ID'; // Indonesian voice

                // Adjust pitch/rate based on personality
                if (personality === "manja") {
                    utterance.pitch = 1.6; utterance.rate = 1.1; // Suara tinggi, manja
                } else if (personality === "usil") {
                    utterance.pitch = 1.3; utterance.rate = 1.4; // Suara agak cepat, meledek
                } else if (personality === "bijak") {
                    utterance.pitch = 0.8; utterance.rate = 0.8; // Suara berat, dewasa
                } else {
                    utterance.pitch = 1.0; utterance.rate = 1.0; // Default
                }
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // 🏃 3D Animation Mixer Control
        function setNagaAnimation(clipName) {
            // Catatan: Aset placeholder mungkin tidak memiliki semua klip animasi ini.
            // Di MVP sungguhan, pastikan klip ini terdaftar di file .glb-mu.
            nagaEl.setAttribute('animation-mixer', `clip: ${clipName}; crossFadeDuration: 0.3; loop: repeat`);
        
            // UI Update Status
            if(clipName === 'angry') statusText.innerText = 'Ngambek...';
            else if(clipName === 'laugh') statusText.innerText = 'Meledek...';
            else statusText.innerText = 'Floating...';
        }

        // 🎬 Sinematik: Terbang Menjauh & Hilang
        function akhiriObrolan() {
            if (hasExited) return;
            hasExited = true;

            // 1. Update UI Status
            statusText.innerHTML = '<span class="w-1.5 h-1.5 bg-rose-400 rounded-full"></span>Bye Bye!';
            statusText.classList.remove('text-cyan-400');
            statusText.classList.add('text-rose-400');
            uiContainer.classList.add('opacity-0'); // Hide UI smooth

            // 2. Play 'Fly Away' or 'Run' animation
            setNagaAnimation('walk'); // Assumes 'walk' or 'fly' clip

            // 3. Trigger the pre-defined fly away position & scale animation
            // Ini memanggil event 'exitRequested' yang diatur di entity HTML
            nagaEl.emit('exitRequested');

            // 4. Voice message perpisahan
            speakVoice("Daaah manusia lemah! *Rawr!* Aku mau balik ke sarang!", "usil");

            // 5. Hide completely after duration
            setTimeout(() => {
                nagaEl.setAttribute('visible', 'false');
                alert("Naga Ignis sudah kembali ke sarangnya! ✨");
            }, 3500);
        }

        // UI Utility: Add message bubble
        function addChatMessage(text, sender) {
            const bubbleHtml = sender === "user" 
                ? `
                    <div class="flex items-end gap-2 max-w-[80%] ml-auto justify-end pointer-events-none">
                        <div class="bg-cyan-600 text-white p-3 rounded-2xl rounded-br-none shadow-md text-xs font-semibold">
                            ${text}
                        </div>
                    </div>
                ` 
                : `
                    <div class="flex items-end gap-2 max-w-[80%] pointer-events-none">
                        <div class="w-7 h-7 rounded-full bg-gradient-to-tr from-cyan-600 to-blue-500 flex items-center justify-center text-[10px] text-white shrink-0">I</div>
                        <div class="bg-slate-800 text-slate-200 p-3 rounded-2xl rounded-bl-none border border-slate-700/50 text-xs">
                            ${text}
                        </div>
                    </div>
                `;
            
            chatMessages.innerHTML += bubbleHtml;
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto-scroll to bottom
        }

        // Support 'Enter' key to send message
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') kirimPesan();
        });
    </script>
</body>
</html>
